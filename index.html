<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZenSpace Pro | Master Sadhana</title>
    <style>
        :root { --blue: #38bdf8; --gold: #f59e0b; --bg: #0f172a; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: system-ui; overflow-x: hidden; min-height: 100vh; }
        
        /* THE PASHUPATI BACKGROUND */
        .bg-overlay { position: fixed; inset: 0; background-image: url('pashupati.png'); background-size: cover; background-position: center; opacity: 0.15; filter: sepia(0.5); z-index: -1; }

        .app-container { display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        
        /* 1. STATUS BAR */
        .status-bar { width: 100%; display: flex; justify-content: space-between; font-size: 0.8rem; opacity: 0.6; margin-bottom: 30px; }

        /* 2. YOGESHWAR & INDUS SCRIPT */
        .portrait { width: 180px; height: 180px; transition: 4s ease-in-out; filter: drop-shadow(0 0 20px rgba(56,189,248,0.2)); }
        .inhale { transform: scale(1.1); }

        /* 3. MANTRA & ALERTNESS */
        #mantraDisplay { font-size: 2.5rem; letter-spacing: 8px; margin: 20px 0; color: var(--blue); }
        #timerDisplay { font-size: 3rem; font-weight: 100; opacity: 0.5; }

        /* 4. FEATURES & BUTTONS */
        .controls { display: flex; flex-direction: column; gap: 20px; align-items: center; margin-top: 30px; }
        #masterBtn { background: none; border: 2px solid #fff; color: #fff; padding: 15px 50px; border-radius: 50px; font-weight: bold; cursor: pointer; }
        
        /* 5. STATISTICS HEATMAP */
        .stats-section { margin-top: 50px; width: 100%; max-width: 300px; }
        #heatmap { display: grid; grid-template-columns: repeat(14, 1fr); gap: 4px; margin-top: 10px; }
        .sq { width: 15px; height: 15px; background: #1e293b; border-radius: 2px; }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>
    <div class="app-container">
        <div class="status-bar">
            <span>Brahma Muhurta: 5:02 AM</span>
            <span id="streak">🔥 1 Day Streak</span>
        </div>

        <div id="yogeshwar" class="portrait">
            <svg viewBox="0 0 200 200">
                <circle cx="100" cy="100" r="90" fill="rgba(255,255,255,0.05)" stroke="white" stroke-opacity="0.2"/>
                <circle cx="100" cy="70" r="30" fill="var(--blue)" opacity="0.8"/>
                <text x="100" y="68" fill="white" font-size="12" text-anchor="middle">𐤇</text>
            </svg>
        </div>

        <div id="mantraDisplay">READY</div>
        <div id="timerDisplay">10:00</div>

        <div class="controls">
            <div style="display:flex; gap:10px;">
                <button class="chip" onclick="toggleMantra()">Change Mantra</button>
                <button class="chip" onclick="alert('Measuring Alertness via Dongs...')">Alertness Info</button>
            </div>
            <button id="masterBtn" onclick="toggleSadhana()">BEGIN SADHANA</button>
        </div>

        <div class="stats-section">
            <h4 style="margin:0; opacity:0.7">Sadhana Ledger (30 Days)</h4>
            <div id="heatmap"></div>
            <button style="margin-top:20px; background:none; border:none; color:var(--blue); font-size:0.8rem;" onclick="shareWhatsApp()">📤 Share WhatsApp Report</button>
        </div>
    </div>

    <script>
        let isPlaying = false;
        let mantras = ["SO-HAM", "OM", "AUM"];
        let mIdx = 0;

        // Initialize Heatmap
        const hm = document.getElementById('heatmap');
        for(let i=0; i<28; i++) {
            let s = document.createElement('div');
            s.className = 'sq';
            if(i === 27) s.style.background = '#38bdf8'; // Mark today
            hm.appendChild(s);
        }

        function toggleMantra() {
            mIdx = (mIdx + 1) % mantras.length;
            document.getElementById('mantraDisplay').textContent = mantras[mIdx];
        }

        function toggleSadhana() {
            if(!isPlaying) {
                isPlaying = true;
                document.getElementById('masterBtn').textContent = "STOP SESSION";
                startFlow();
            } else {
                location.reload();
            }
        }

        function startFlow() {
            // Logic for 3D Sound & Stillness Sensing
            console.log("Audio Context Started...");
            setInterval(() => {
                if(!isPlaying) return;
                document.getElementById('yogeshwar').classList.toggle('inhale');
            }, 4000);
        }

        function shareWhatsApp() {
            const text = "🧘 ZenSpace Sadhana: Achieved Alpha State today! Alertness: 96%";
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`);
        }
    </script>
</body>
</html>
