<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZenSpace Pro | Yogeshwar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="background-texture" style="background-image: url('pashupati.png');"></div>

    <div class="app-container">
        <button id="helpBtn" onclick="toggleTutorial()">?</button>
        
        <div class="header-status">
            <span id="muhurtaTime">Calculating...</span>
            <span id="streakDisplay">🔥 0 Days</span>
        </div>

        <div id="yogeshwarPortrait" class="portrait-container">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="shiva-grad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <circle cx="100" cy="100" r="95" fill="rgba(56, 189, 248, 0.03)"/>
                <g id="ribcage-breath" transform="translate(100, 110)">
                    <ellipse cx="0" cy="0" rx="40" ry="50" fill="url(#shiva-grad)" opacity="0.6"/>
                </g>
                <g id="head" transform="translate(100, 70)">
                    <ellipse cx="0" cy="0" rx="28" ry="35" fill="url(#shiva-grad)" stroke="#fff" stroke-width="1.5"/>
                    <text id="thirdEye" x="0" y="-12" font-size="12" fill="white" opacity="0.6" text-anchor="middle">𐤇</text>
                </g>
            </svg>
        </div>

        <div id="mantraDisplay">READY</div>
        <div id="timerDisplay">10:00</div>

        <div class="duration-picker">
            <button class="chip active" data-mins="10">10m</button>
            <button class="chip" data-mins="20">20m</button>
            <button class="chip" data-mins="60">1h</button>
        </div>

        <button id="masterBtn">BEGIN SADHANA</button>

        <div class="seat-map"><div id="postureDot"></div></div>

        <div class="stats-panel">
            <div id="heatmapGrid"></div>
            <button id="shareBtn" class="chip">📤 Share WhatsApp Report</button>
        </div>
    </div>

    <div id="modalOverlay" class="modal">
        <div class="modal-content" id="modalBody"></div>
    </div>

    <div id="tutorialOverlay" class="modal">
        <div class="modal-content help-guide">
            <h2>Sadhana Guide</h2>
            <div class="help-item"><span>📱</span><p><strong>Phone in Pocket:</strong> Tracks <strong>Stillness</strong>. Required for Seat Map & State sensing.</p></div>
            <div class="help-item"><span>🐚</span><p><strong>Sacred Sounds:</strong> 90%=Damru, 95%=Flute, 98%=Conch.</p></div>
            <div class="help-item"><span>🔔</span><p><strong>Vigilance:</strong> Count the 'Dongs' to prove <strong>Alertness</strong>.</p></div>
            <button class="chip active" onclick="toggleTutorial()" style="width:100%">Start Practice</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
